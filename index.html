<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }

main {
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
  height: calc(100% - 50px);
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
}
main h1 { color: white; margin-bottom: 15px; font-size: clamp(24px, 5vw, 36px); }
main p { color: white; line-height: 1.6; }
.game-container { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 400px; }
.board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  background: rgba(255, 255, 255, 0.2);
  padding: 5px;
  border-radius: 10px;
  width: 100%;
  aspect-ratio: 1;
}
.cell {
  background: rgba(255, 255, 255, 0.9);
  border: none;
  border-radius: 5px;
  font-size: clamp(24px, 8vw, 48px);
  font-weight: bold;
  cursor: pointer;
  transition: background 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  aspect-ratio: 1;
}
.cell:hover { background: rgba(255, 255, 255, 1); }
.cell.winner { background: #4CAF50; color: white; }
.game-info { display: flex; align-items: center; gap: 20px; color: white; font-size: 18px; }
#resetBtn {
  padding: 10px 25px;
  font-size: 16px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.3s;
}
#resetBtn:hover { background: #45a049; }
#status { font-size: 20px; font-weight: bold; }
.usage-panel {
  background: rgba(255, 255, 255, 0.1);
  padding: 15px 20px;
  border-radius: 8px;
  max-width: 400px;
  color: white;
  font-size: 14px;
  line-height: 1.5;
}
.usage-panel h3 {
  margin-bottom: 10px;
  font-size: 16px;
  color: #66BB6A;
}
</style>
<script src="https://zihaohong.github.io/data/lib/navbar/navbar.js"></script>
</head>
<body>
<main>
  <h1>Tic Tac Toe</h1>
  <div class="game-container">
    <div class="board" id="board"></div>
    <div class="game-info">
      <p id="status">Player X's turn</p>
      <button id="resetBtn">Reset Game</button>
    </div>
    <div class="usage-panel" id="usagePanel">
      <h3>How to Play</h3>
      <p id="usageText">Loading...</p>
    </div>
  </div>
</main>
<script>
// Tic Tac Toe Game Logic
const TicTacToe = {
  board: [],
  currentPlayer: 'X',
  gameOver: false,

  init: function() {
    this.board = Array(9).fill(null);
    this.currentPlayer = 'X';
    this.gameOver = false;
    this.renderBoard();
    this.bindEvents();
    this.updateStatus();
  },

  renderBoard: function() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('button');
      cell.className = 'cell';
      cell.dataset.index = i;
      cell.textContent = this.board[i] || '';
      boardEl.appendChild(cell);
    }
  },

  bindEvents: function() {
    document.getElementById('board').addEventListener('click', (e) => {
      if (e.target.classList.contains('cell')) {
        this.handleCellClick(parseInt(e.target.dataset.index));
      }
    });
    document.getElementById('resetBtn').addEventListener('click', () => { this.init(); });
  },

  handleCellClick: function(index) {
    if (this.gameOver || this.board[index]) return;
    this.board[index] = this.currentPlayer;
    this.renderBoard();
    if (this.checkWin()) {
      this.gameOver = true;
      document.getElementById('status').textContent = `Player ${this.currentPlayer} wins!`;
      this.highlightWinner();
    } else if (this.board.every(cell => cell !== null)) {
      this.gameOver = true;
      document.getElementById('status').textContent = "It's a draw!";
    } else {
      this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
      this.updateStatus();
    }
  },

  checkWin: function() {
    const lines = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];
    for (const line of lines) {
      const [a,b,c] = line;
      if (this.board[a] && this.board[a] === this.board[b] && this.board[a] === this.board[c]) {
        this.winningLine = line;
        return true;
      }
    }
    return false;
  },

  highlightWinner: function() {
    if (this.winningLine) {
      const cells = document.querySelectorAll('.cell');
      this.winningLine.forEach(index => { cells[index].classList.add('winner'); });
    }
  },

  updateStatus: function() {
    document.getElementById('status').textContent = `Player ${this.currentPlayer}'s turn`;
  }
};

document.addEventListener('DOMContentLoaded', () => {
  Navbar.init();
  TicTacToe.init();
});
</script>
</body>
</html>
